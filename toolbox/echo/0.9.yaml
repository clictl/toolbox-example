spec: '1.0'
name: echo
description: HTTP echo service for testing requests and responses
version: '0.9'
category: demo
tags:
- demo
- testing
- http
- echo
server:
  url: https://httpbin.org
  timeout: 10s
  headers:
    Accept: application/json
actions:
- name: get
  description: Send a GET request and see the parsed response
  request:
    method: GET
    path: /get
  params:
  - name: key
    type: string
    description: Any query parameter key
    in: query
- name: post
  description: Send data via POST and see it echoed back
  request:
    method: POST
    path: /post
- name: status
  description: Get a response with a specific HTTP status code
  request:
    method: GET
    path: /status/{code}
  params:
  - name: code
    type: int
    required: true
    description: HTTP status code to return
    in: path
protocol: http
