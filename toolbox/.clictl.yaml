# clictl Toolbox Configuration
# Place this file inside your toolbox/ folder alongside your tool specs.
# The CLI scans this directory for YAML specs when syncing.
# Workspace is determined by your API key (clictl login or CLICTL_API_KEY).

# Publisher namespace (optional, for published tools)
# namespace: mycompany

# Only sync from these branches (default: main, master)
branches:
  - main
