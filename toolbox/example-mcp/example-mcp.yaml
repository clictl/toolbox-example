name: example-mcp
description: Example MCP server that provides weather data via the Model Context Protocol
version: "1.0"
category: demo
tags: [demo, mcp, weather, example]
protocol: mcp
owner_name: clictl
website: https://clictl.dev
pricing_model: free
license: MIT

package:
  registry: npm
  name: "@example/weather-mcp"
  version: "1.0.0"
  manager: npx

auth:
  - type: api_key
    key_env: WEATHER_API_KEY
    inject:
      location: env
      param: WEATHER_API_KEY

tools:
  mode: explicit
  expose:
    - name: get_forecast
      description: "Get weather forecast for a location"
    - name: get_current
      description: "Get current weather conditions"
    - name: get_alerts
      description: "Get active weather alerts for a region"
      destructive: false
  tool_transforms:
    get_forecast:
      - truncate: { max_items: 7 }

prompts:
  system: |
    This server provides weather data. Use get_current for
    current conditions and get_forecast for multi-day forecasts.

resources:
  expose: all

install_mode:
  default: both
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
