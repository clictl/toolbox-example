name: hello-world
description: A simple hello world API for testing clictl
version: "0.9"
category: demo
tags: [demo, hello, testing]
protocol: rest
owner_name: clictl
website: https://clictl.dev
pricing_model: free

connection:
  base_url: https://httpbin.org
  timeout: 10s

actions:
  - name: greet
    description: Returns a greeting message by echoing your name
    method: GET
    path: /get
    params:
      - name: name
        type: string
        required: true
        description: "Name to greet"
        in: query
    transform:
      extract: "$.args"
