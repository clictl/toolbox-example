spec: "1.0"
name: hello-world
description: A simple hello world API for testing clictl
version: "0.9"
category: demo
tags: [demo, hello, testing]

server:
  type: http
  url: https://httpbin.org
  timeout: 10s

actions:
  - name: greet
    description: Returns a greeting message by echoing your name
    request:
      method: GET
      path: /get
    params:
      - name: name
        type: string
        required: true
        description: "Name to greet"
        in: query
    transform:
      - type: extract
        path: "$.args"
