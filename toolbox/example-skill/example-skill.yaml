name: example-skill
description: Example skill that teaches agents to generate release notes from git history
version: "1.0"
category: developer
tags: [demo, skill, release-notes, git, example]
protocol: skill
owner_name: clictl
website: https://clictl.dev
pricing_model: free
license: MIT

source:
  type: github
  repo: clictl/example-repo
  path: skills/release-notes/
  ref: main
  files:
    - name: SKILL.md
      description: Instructions for generating release notes
    - name: release_notes.py
      description: Python script to parse git log and format notes

platforms:
  - name: claude-code
    install_method: skill
    config_path: .claude/skills/
  - name: cursor
    install_method: skill
    config_path: .cursor/skills/

skill_metadata:
  author: clictl
  version: "1.0"

auth:
  - type: none

requires_tools: [bash, read, write]

permissions:
  filesystem:
    read: ["./"]
    write: ["./CHANGELOG.md", "./RELEASE_NOTES.md"]
  env: ["GITHUB_TOKEN"]

runtime:
  language: python
  manager: uvx
