# clictl Toolbox Configuration
# This file tells `clictl toolbox sync` where to push tool metadata.

# Your workspace slug (required)
workspace: ""

# Publisher namespace (optional, for published tools)
# namespace: "@mycompany"

# Directories to scan for tool specs
# Uses the same letter-prefix structure as the official toolbox
spec_paths:
  - "toolbox/"

# Only sync from these branches (default: main, master)
branches:
  - main
